_schema-version: 3.3.0
ID: AiInterviewer
description: A simple CAP project.
version: 1.0.0
modules:
- name: AiInterviewer-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: AiInterviewer-auth
  - name: AiInterviewer-db
  - name: AiInterviewer-connectivity
  - name: AiInterviewer-destination
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: AiInterviewer-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: AiInterviewer-db
  parameters:
    buildpack: nodejs_buildpack
- name: AiInterviewer-app-deployer
  type: com.sap.application.content
  path: gen
  requires:
  - name: AiInterviewer-auth
  - name: srv-api
  - name: AiInterviewer-html5-repo-host
    parameters:
      config:
        HTML5Runtime_enabled: true
      content-target: true
  build-parameters:
    build-result: app/
    requires:
    - artifacts:
      - aiinterviewerai.zip
      name: aiinterviewerai
      target-path: app/
- name: AiInterviewer-destination-content
  type: com.sap.application.content
  requires:
  - name: AiInterviewer-destination
    parameters:
      content-target: true
  - name: AiInterviewer-html5-repo-host
    parameters:
      service-key:
        name: AiInterviewer-html5-repo-host-key
  - name: AiInterviewer-auth
    parameters:
      service-key:
        name: AiInterviewer-auth-key
  parameters:
    content:
      instance:
        destinations:
        - Name: ai_AiInterviewer_html5_repo_host
          ServiceKeyName: AiInterviewer-html5-repo-host-key
          sap.cloud.service: ai
        - Authentication: OAuth2UserTokenExchange
          Name: ai_AiInterviewer_auth
          ServiceInstanceName: AiInterviewer-auth
          ServiceKeyName: AiInterviewer-auth-key
          sap.cloud.service: ai
        existing_destinations_policy: ignore
  build-parameters:
    no-source: true
- name: aiinterviewerai
  type: html5
  path: app/interviewerai
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
resources:
- name: AiInterviewer-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
      tenant-mode: dedicated
      xsappname: AiInterviewer-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
- name: AiInterviewer-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: AiInterviewer-connectivity
  type: org.cloudfoundry.managed-service
  parameters:
    service: connectivity
    service-plan: lite
- name: AiInterviewer-destination
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          - Authentication: NoAuthentication
            HTML5.DynamicDestination: true
            HTML5.ForwardAuthToken: true
            Name: srv-api
            ProxyType: Internet
            Type: HTTP
            URL: ~{srv-api/srv-url}
          existing_destinations_policy: update
    service: destination
    service-plan: lite
  requires:
  - name: srv-api
- name: AiInterviewer-html5-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - npx cds build --production
